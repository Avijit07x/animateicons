name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
        env:
          CI: true

      - name: Build project
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Typecheck npm package
        run: pnpm --filter @animateicons/react typecheck

      - name: Build npm package
        run: pnpm --filter @animateicons/react build

      - name: Smoke-test npm package against built dist
        run: pnpm --filter @animateicons/react test:smoke

      - name: Enforce npm bundle size budget
        run: pnpm --filter @animateicons/react size
